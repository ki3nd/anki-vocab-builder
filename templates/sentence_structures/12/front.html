<div class="bf12-card bf12-front">
  <div class="bf12-hero">
    <div class="bf12-word">{{Structure}}</div>

    {{#Tags}}
    <div class="bf12-controls">
      <div class="bf12-badge">{{Tags}}</div>
    </div>
    {{/Tags}}
  </div>

  {{#Sentence}}
  <section class="bf12-panel bf12-example-panel">
    <div class="bf12-panel-head"><span>Example</span></div>
    <div class="bf12-sentence">{{Sentence}}</div>
  </section>
  {{/Sentence}}

  {{#Image}}
  <div class="bf12-image">{{Image}}</div>
  {{/Image}}
</div>
