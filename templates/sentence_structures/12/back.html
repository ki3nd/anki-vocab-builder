<div class="bf12-card bf12-back">
  <div class="bf12-hero bf12-hero-compact">
    <div class="bf12-word">{{Structure}}</div>
  </div>

  {{#Meaning}}
  <section class="bf12-panel bf12-definition-panel">
    <div class="bf12-panel-head"><span>Meaning</span></div>
    <div class="bf12-definition">{{Meaning}}</div>
  </section>
  {{/Meaning}}

  {{#Examples}}
  <section class="bf12-panel bf12-examples-panel">
    <div class="bf12-panel-head"><span>Examples</span></div>
    <div class="bf12-examples">{{Examples}}</div>
  </section>
  {{/Examples}}

  {{#Equivalent}}
  <section class="bf12-panel bf12-quote-panel">
    <div class="bf12-panel-head"><span>Equivalent</span></div>
    <div class="bf12-quote">{{Equivalent}}</div>
  </section>
  {{/Equivalent}}

  {{#Tags}}
  <div class="bf12-tag-row"><span class="bf12-tag">{{Tags}}</span></div>
  {{/Tags}}

  {{#Image}}
  <div class="bf12-image">{{Image}}</div>
  {{/Image}}
</div>
