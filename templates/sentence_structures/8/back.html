<div class="lp8-back">

  <div class="lp8-word-wrap">
    <span class="lp8-word">{{Structure}}</span>
  </div>

  <hr class="lp8-divider">

  {{#Meaning}}
  <div class="lp8-definition">{{Meaning}}</div>
  <hr class="lp8-divider">
  {{/Meaning}}

  {{#Examples}}
  <div class="lp8-examples-block">
    <span class="lp8-section-label">Examples</span>
    <div class="lp8-examples-text">{{Examples}}</div>
  </div>
  {{/Examples}}

  {{#Equivalent}}
  <div class="lp8-equivalent-block">
    <span class="lp8-meta-label">Equivalent</span>
    <span class="lp8-equivalent-value">{{Equivalent}}</span>
  </div>
  {{/Equivalent}}

  {{#Tags}}
  <div class="lp8-tags-block">
    <span class="lp8-section-label">Tags</span>
    <span class="lp8-tags-value">{{Tags}}</span>
  </div>
  {{/Tags}}

  {{#Image}}<div class="lp8-image">{{Image}}</div>{{/Image}}

</div>
