<div class="dl-back">

  <div class="dl-word-wrap">
    <span class="dl-word">{{Structure}}</span>
  </div>

  <hr class="dl-divider">

  {{#Meaning}}
  <div class="dl-section-header">
    <span class="dl-section-label">Meaning</span>
  </div>
  <div class="dl-definition">{{Meaning}}</div>
  <hr class="dl-divider">
  {{/Meaning}}

  {{#Examples}}
  <div class="dl-section-header">
    <span class="dl-section-label">Examples</span>
  </div>
  <div class="dl-examples-text">{{Examples}}</div>
  {{/Examples}}

  {{#Equivalent}}
  <div class="dl-section-header dl-meta-top">
    <span class="dl-section-label">Equivalent</span>
  </div>
  <div class="dl-equivalent">{{Equivalent}}</div>
  {{/Equivalent}}

  {{#Tags}}
  <div class="dl-meta-block dl-meta-top">
    <span class="dl-meta-label">Tags</span>
    <span class="dl-meta-value">{{Tags}}</span>
  </div>
  {{/Tags}}

  {{#Image}}<div class="dl-image">{{Image}}</div>{{/Image}}

</div>
