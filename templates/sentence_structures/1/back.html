<div class="card-back">

  <div class="ss-structure-wrap">
    <span class="ss-structure">{{Structure}}</span>
  </div>

  <hr class="v2-divider">

  {{#Meaning}}
  <div class="v2-section-header">
    <span class="v2-section-label">Meaning</span>
  </div>
  <div class="v2-definition">{{Meaning}}</div>
  <hr class="v2-divider">
  {{/Meaning}}

  {{#Examples}}
  <div class="v2-section-header">
    <span class="v2-section-label">Examples</span>
  </div>
  <div class="v2-examples-text">{{Examples}}</div>
  {{/Examples}}

  {{#Equivalent}}
  <div class="v2-section-header" style="margin-top:14px;">
    <span class="v2-section-label">Equivalent</span>
  </div>
  <div class="v2-quote">{{Equivalent}}</div>
  {{/Equivalent}}

  {{#Tags}}
  <div class="v2-meta-block" style="margin-top:12px;">
    <span class="v2-meta-label">Tags</span>
    <span class="v2-meta-value">{{Tags}}</span>
  </div>
  {{/Tags}}

</div>
