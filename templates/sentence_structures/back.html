<div class="card-back">

  <div class="structure-label">Structure</div>
  <div class="structure">{{Structure}}</div>

  <hr class="divider">

  {{#Meaning}}
  <div class="meaning">{{Meaning}}</div>
  <hr class="divider">
  {{/Meaning}}

  {{#Examples}}
  <div class="section-label">Examples</div>
  <ol class="examples-list" id="back-examples"></ol>
  {{/Examples}}

  {{#Equivalent}}
  <div class="section-label">Equivalent</div>
  <div class="equiv-row" id="equiv-row"></div>
  {{/Equivalent}}

  {{#Tags}}
  <div class="badge-row tag-row">
    <span class="badge-label">Tags:</span>
    <span id="tags-back"></span>
  </div>
  {{/Tags}}

</div>

<script>
(function () {
  var raw = "{{Examples}}";
  if (raw && raw !== "{{Examples}}") {
    var list = document.getElementById("back-examples");
    raw.split(" · ").forEach(function (ex) {
      var li = document.createElement("li");
      li.textContent = ex.trim();
      list.appendChild(li);
    });
  }

  var equiv = "{{Equivalent}}";
  var equivEl = document.getElementById("equiv-row");
  if (equiv && equiv !== "{{Equivalent}}" && equivEl) {
    equiv.split(",").forEach(function (e) {
      var span = document.createElement("span");
      span.className = "badge badge-equiv";
      span.textContent = e.trim();
      equivEl.appendChild(span);
    });
  }

  var tags = "{{Tags}}";
  var tagsEl = document.getElementById("tags-back");
  if (tags && tags !== "{{Tags}}" && tagsEl) {
    tags.split(",").forEach(function (t) {
      var span = document.createElement("span");
      span.className = "badge badge-tag";
      span.textContent = t.trim();
      tagsEl.appendChild(span);
    });
  }
})();
</script>
