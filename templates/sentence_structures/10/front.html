<div class="oa10-front">

  <div class="oa10-word-wrap">
    <span class="oa10-word">{{Structure}}</span>
  </div>

  {{#Tags}}
  <div class="oa10-pos-row"><span class="oa10-pos">{{Tags}}</span></div>
  {{/Tags}}

  <hr class="oa10-divider">

  {{#Sentence}}
  <div class="oa10-sentence-block">
    <div class="oa10-sentence-header">
      <span class="oa10-section-label">Example</span>
    </div>
    <div class="oa10-sentence-text">{{Sentence}}</div>
  </div>
  {{/Sentence}}

  {{#Image}}<div class="oa10-image">{{Image}}</div>{{/Image}}

</div>
