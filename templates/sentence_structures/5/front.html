<div class="cu5-front">

  <div class="cu5-word-wrap">
    <span class="cu5-word">{{Structure}}</span>
  </div>

  {{#Tags}}
  <div class="cu5-pos-row"><span class="cu5-pos">{{Tags}}</span></div>
  {{/Tags}}

  <hr class="cu5-divider">

  {{#Sentence}}
  <div class="cu5-sentence-block">
    <div class="cu5-sentence-header">
      <span class="cu5-section-label">example</span>
      {{#SentenceAudio}}<span class="cu5-sent-audio">{{SentenceAudio}}</span>{{/SentenceAudio}}
    </div>
    <div class="cu5-sentence-text">{{Sentence}}</div>
  </div>
  {{/Sentence}}

  {{#Image}}<div class="cu5-image">{{Image}}</div>{{/Image}}

</div>
